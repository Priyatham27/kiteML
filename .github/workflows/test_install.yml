# ──────────────────────────────────────────────────────────────────────
#  KiteML — Installation Verification Workflow
#  Tests that the package installs cleanly across OS and Python versions
# ──────────────────────────────────────────────────────────────────────
name: Test Installation

on:
  push:
    branches: ["main"]
    paths:
      - "pyproject.toml"
      - "setup.cfg"
      - "MANIFEST.in"
      - "kiteml/**"
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  test-install:
    name: Install Test (${{ matrix.os }} / Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install from source
        run: |
          python -m pip install --upgrade pip
          pip install .

      - name: Verify import
        run: python -c "import kiteml; print(f'KiteML {kiteml.__version__} installed successfully')"

      - name: Run install verification
        run: python scripts/verify_install.py

      - name: Run smoke tests
        run: python scripts/smoke_test.py

  test-sdist:
    name: Test sdist build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build and install from sdist
        run: |
          python -m pip install --upgrade pip
          pip install build
          python -m build --sdist
          pip install dist/*.tar.gz

      - name: Verify sdist install
        run: python -c "import kiteml; print(f'KiteML {kiteml.__version__} (from sdist)')"

  test-wheel:
    name: Test wheel build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build and install from wheel
        run: |
          python -m pip install --upgrade pip
          pip install build
          python -m build --wheel
          pip install dist/*.whl

      - name: Verify wheel install
        run: python -c "import kiteml; print(f'KiteML {kiteml.__version__} (from wheel)')"
