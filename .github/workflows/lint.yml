name: KiteML Lint & Type Check

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  quality:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Check Formatting (Black)
        run: black --check kiteml/ tests/

      - name: Lint with Ruff
        run: ruff check kiteml/ tests/

      - name: Type Check (MyPy)
        run: mypy kiteml/ --ignore-missing-imports || true
