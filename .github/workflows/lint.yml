name: KiteML Lint & Type Check

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        
    - name: Install Linting Tools
      run: |
        pip install ruff mypy black
        
    - name: Check Formatting (Black)
      run: black --check kiteml/ tests/ || echo "Black formatting issues found"
      
    - name: Lint with Ruff
      run: ruff check kiteml/ tests/
      
    - name: Type Check (MyPy)
      run: mypy kiteml/ --ignore-missing-imports
