# ──────────────────────────────────────────────────────────────────────
#  KiteML — Documentation Deployment Workflow
#  Auto-deploys MkDocs to GitHub Pages on push to main
# ──────────────────────────────────────────────────────────────────────
name: Deploy Docs

on:
  push:
    branches: ["main"]
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "kiteml/**"

permissions:
  contents: write

jobs:
  deploy:
    name: Deploy Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install documentation dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements/docs.txt
          pip install -e .

      - name: Deploy to GitHub Pages
        run: mkdocs gh-deploy --force
