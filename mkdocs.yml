site_name: KiteML
site_description: Production-Grade Intelligent AutoML Ecosystem
site_author: KiteML Community
site_url: https://priyatham27.github.io/kiteML/

theme:
  name: material
  logo: assets/logo.svg
  favicon: assets/favicon.svg
  language: en
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: blue
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: blue
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.path
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tabs.link

nav:
  - Home: index.md
  - Getting Started:
    - Installation: getting-started/installation.md
    - Quick Start: getting-started/quickstart.md
    - First Model: getting-started/first-model.md
  - User Guide:
    - Dataset Analysis: user-guide/dataset-analysis.md
    - Validation: user-guide/validation.md
    - Preprocessing: user-guide/preprocessing.md
    - Feature Engineering: user-guide/feature-engineering.md
    - Training: user-guide/training.md
    - Optimization: user-guide/optimization.md
    - Evaluation: user-guide/evaluation.md
    - Model Selection: user-guide/model-selection.md
    - Prediction: user-guide/prediction.md
    - Deployment: user-guide/deployment.md
  - API Reference:
    - Intelligence: api/intelligence.md
    - Validation: api/validation.md
    - Pipeline: api/pipeline.md
    - Training: api/training.md
    - Evaluation: api/evaluation.md
    - Prediction: api/prediction.md
    - Deployment: api/deployment.md
  - Architecture:
    - Overview: architecture/overview.md
    - Epic 1 Intelligence: architecture/epic1.md
    - Epic 2 Validation: architecture/epic2.md
    - Epic 3 Developer Experience: architecture/epic3.md
    - Epic 4 Intelligent Pipeline: architecture/epic4.md
    - Epic 5 Training & Deployment: architecture/epic5.md
    - Diagrams: architecture/diagrams.md
  - Examples:
    - House Prices: examples/house_prices/README.md
    - Iris: examples/iris/README.md
    - Titanic: examples/titanic/README.md
    - Customer Churn: examples/customer_churn/README.md
  - FAQ: faq.md

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - attr_list
  - md_in_html
  - tables
